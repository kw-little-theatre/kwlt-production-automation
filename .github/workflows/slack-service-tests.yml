name: Slack Service Tests

on:
  push:
    paths:
      - 'slack-service/**'
  pull_request:
    paths:
      - 'slack-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slack-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: ruff check app/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
